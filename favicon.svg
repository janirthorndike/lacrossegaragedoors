<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="La Crosse Garage Doors">
  <!-- door body -->
  <rect x="6" y="6" width="36" height="36" rx="3.5" fill="#f2b705"/>
  <!-- top window row -->
  <g fill="#1f2833">
    <rect x="10.5" y="11" width="8" height="4.5" rx="1"/>
    <rect x="20" y="11" width="8" height="4.5" rx="1"/>
    <rect x="29.5" y="11" width="8" height="4.5" rx="1"/>
  </g>
  <!-- panel section lines -->
  <g stroke="#1f2833" stroke-width="1.6" stroke-linecap="round">
    <line x1="9" y1="21.5" x2="39" y2="21.5"/>
    <line x1="9" y1="29" x2="39" y2="29"/>
    <line x1="9" y1="36.5" x2="39" y2="36.5"/>
  </g>
</svg>
